name: nav-update
on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run NAV update
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python scripts/nav_update.py
      - name: Upload DB
        uses: actions/upload-artifact@v4
        with:
          name: fund-db
          path: fund_data.db
          if-no-files-found: ignore
      - name: Push DB to data branch
        env:
          GIT_AUTHOR_NAME: actions-bot
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: actions-bot
          GIT_COMMITTER_EMAIL: actions@github.com
          REPO_AUTH: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          DBPATH="${{ github.workspace }}/fund_data.db"
          if [ -f "$DBPATH" ]; then
            mkdir -p /tmp/data-push
            cp "$DBPATH" /tmp/data-push/fund_data.db
            cd /tmp/data-push
            git init
            git config user.name "${GIT_AUTHOR_NAME}"
            git config user.email "${GIT_AUTHOR_EMAIL}"
            git checkout -b data
            git add fund_data.db
            git commit -m "data: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git remote add origin "${REPO_AUTH}"
            git push -f origin data
            cd "${{ github.workspace }}"
          else
            echo "fund_data.db not found, skip pushing data branch."
          fi
